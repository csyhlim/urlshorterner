<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Shortener</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #7f7fd5, #86a8e7, #91eae4);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* background glow */
    body::before {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        background: rgba(255,255,255,0.2);
        filter: blur(100px);
        border-radius: 50%;
        top: -100px;
        left: -100px;
    }

    .container {
        width: 520px;
        padding: 40px;
        border-radius: 20px;

        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(20px);

        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        text-align: center;
        color: #222;
        animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    h2 {
        margin-bottom: 25px;
        font-size: 28px;
        font-weight: bold;
    }

    input[type="text"] {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        outline: none;
        font-size: 14px;
        margin-bottom: 15px;
        box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
    }

    input[type="text"]:focus {
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    button {
        padding: 12px 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.05);
    }

    .result-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 14px;
        background: rgba(255,255,255,0.4);
        text-align: left;
    }

    .result-box a {
        display: block;
        margin-top: 8px;
        color: #2b2bff;
        font-weight: bold;
        word-break: break-all;
    }

    .copy-btn {
        margin-top: 10px;
        background: #111;
    }

    .error {
        color: red;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>🔗 URL Shortener Pro</h2>

    <form method="POST" action="/shorten-ui">
        <input type="text" name="url" placeholder="Paste your long URL here..." required>
        <button type="submit">Shorten URL</button>
    </form>

    {% if short_url %}
    <div class="result-box">
        <b>Your Short Link:</b>
        <a href="{{ short_url }}" id="shortLink">{{ short_url }}</a>

        <button class="copy-btn" onclick="copyLink()">Copy Link</button>
    </div>

    <script>
        function copyLink() {
            const link = document.getElementById("shortLink").href;
            navigator.clipboard.writeText(link);
            alert("Copied to clipboard!");
        }
    </script>
    {% endif %}

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>

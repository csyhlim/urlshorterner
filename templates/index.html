<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }

        button:hover {
            background: #5a67d8;
        }

        a {
            display: block;
            margin-top: 10px;
            color: #667eea;
            word-break: break-all;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .result-box {
            margin-top: 15px;
            padding: 10px;
            background: #f7f7ff;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🔗 Simple URL Shortener</h2>

        <form method="POST" action="/shorten-ui">
            <input type="text" name="url" placeholder="Enter your long URL..." required>
            <button type="submit">Shorten</button>
        </form>

        {% if short_url %}
        <div class="result-box">
            <p><b>Short URL:</b></p>
            <a href="{{ short_url }}" id="shortLink">{{ short_url }}</a>
            <button onclick="copyLink()">Copy</button>
        </div>

        <script>
            function copyLink() {
                const link = document.getElementById("shortLink").href;
                navigator.clipboard.writeText(link);
                alert("Copied!");
            }
        </script>
        {% endif %}

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
